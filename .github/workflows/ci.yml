name: CI

on:
  push:
    branches: [main, preprod, production]
  pull_request:
    branches: [main, preprod, production]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Format, tidy, vet, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify gofmt
        run: test -z "$(gofmt -l .)"
      - name: Verify go mod tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum
      - name: Go vet
        run: go vet ./...
      - name: Build binary
        run: go build -o /dev/null ./cmd/proxy
      - name: Verify VERSION is semver
        run: grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' VERSION

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Unit tests
        run: go test -race -count=1 ./...
      - name: Privacy tests
        run: go test -race -count=1 ./internal/handler/... -run 'Privacy|Redaction|Stream'
      - name: API error contract tests
        run: go test -race -count=1 ./internal/apierr/...
      - name: Routing client tests
        run: go test -race -count=1 ./internal/coreclient/...

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Integration tests
        run: go test -race -count=1 -tags=integration ./internal/integration/...

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [test, integration]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ghcr.io/yadra-team/yadra-bridge:${{ steps.ver.outputs.version }}
          build-args: VERSION=${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docs:
    name: Docs check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required OSS docs exist
        run: |
          for f in README.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md ROADMAP.md CHANGELOG.md LICENSE docs/API.md; do
            test -f "$f" || (echo "missing $f" && exit 1)
          done
